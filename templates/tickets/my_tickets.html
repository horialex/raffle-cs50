{% extends "layout.html" %}

{% block title %}
My Tickets
{% endblock %}

{% block main %}
<div class="container-fluid px-1 pt-0 pb-5 px-lg-2">

    <!-- Page header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow border-0">
                <div class="card-body p-4 header-banner">

                    <div class="row align-items-center g-4">

                        <div class="col-12 col-md">
                            <div class="d-flex flex-column flex-md-row align-items-center text-center text-md-start">
                                <div class="rounded-circle bg-primary-subtle text-primary
                                    d-flex align-items-center justify-content-center
                                    flex-shrink-0 mb-3 mb-md-0 me-md-3 p-3">
                                    <i class="bi bi-ticket-perforated-fill fs-4 d-inline-block"
                                        style="rotate: 30deg;"></i>
                                </div>

                                <div>
                                    <h2 class="fw-bold mb-1">My Tickets</h2>
                                    <p class="text-muted mb-0">
                                        The tickets you own
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>


</div>

{% endblock %}
