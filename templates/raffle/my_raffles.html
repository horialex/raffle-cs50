{% extends "layout.html" %}

{% block title %}
My Raffles
{% endblock %}

{% block main %}
<div class="container py-5">

    <!-- Page header -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow border-0">
                <div class="card-body p-4 header-banner">

                    <div class="row align-items-center g-4">

                        <div class="col-12 col-md">
                            <div class="d-flex flex-column flex-md-row align-items-center text-center text-md-start">
                                <div class="rounded-circle bg-primary-subtle text-primary
            d-flex align-items-center justify-content-center
            flex-shrink-0 mb-3 mb-md-0 me-md-3 p-3">
                                    <i class="bi bi-ticket-perforated-fill fs-4"></i>
                                </div>

                                <div>
                                    <h2 class="fw-bold mb-1">My Raffles</h2>
                                    <p class="text-muted mb-0">
                                        Manage the raffles you created and track their current status.
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-auto">
                            <div class="d-flex flex-column flex-md-row align-items-center gap-3 gap-md-4">

                                <div class="d-flex justify-content-center align-items-center gap-2"
                                    style="min-height: 56px;">
                                    <i class="bi bi-ticket-perforated-fill text-primary fs-3 mb-3"></i>
                                    <i class="bi bi-ticket-perforated-fill text-warning fs-3 mt-3"></i>
                                    <i class="bi bi-stars text-info fs-3 mb-2"></i>
                                </div>

                                <a href="{{ url_for('raffle_bp.create_raffle') }}" class="btn btn-lg btn-primary w-100">
                                    <i class="bi bi-plus-circle me-2"></i>
                                    Create Raffle
                                </a>
                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Filters section: Search, Sort, Filters, Applied filters/Clear filters -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow border-0">
                <div class="card-body p-4">

                    <form method="GET" action="{{ url_for('raffle_bp.my_raffles') }}" class="row g-3 align-items-end">

                        <div class="col-12 col-md-3">
                            <label for="search" class="form-label fw-semibold">Search</label>
                            <input type="text" id="search" name="search" class="form-control"
                                placeholder="Search by raffle title" value="{{ search }}">
                        </div>

                        <div class="col-12 col-md-4">
                            <label for="status" class="form-label fw-semibold">Status</label>
                            <select id="status" name="status" class="form-select">
                                <option value="all" {% if selected_status=="all" %}selected{% endif %}>All statuses
                                </option>
                                <option value="active" {% if selected_status=="active" %}selected{% endif %}>Active
                                </option>
                                <option value="completed" {% if selected_status=="completed" %}selected{% endif %}>
                                    Completed</option>
                                <option value="cancelled" {% if selected_status=="cancelled" %}selected{% endif %}>
                                    Cancelled</option>
                                <option value="draft" {% if selected_status=="draft" %}selected{% endif %}>Draft
                                </option>
                            </select>
                        </div>

                        <div class="col-12 col-md-3">
                            <label for="sort" class="form-label fw-semibold">Sort by</label>
                            <select id="sort" name="sort" class="form-select">
                                <option value="newest" {% if selected_sort=="newest" %}selected{% endif %}>Newest first
                                </option>
                                <option value="oldest" {% if selected_sort=="oldest" %}selected{% endif %}>Oldest first
                                </option>
                                <option value="ending_soon" {% if selected_sort=="ending_soon" %}selected{% endif %}>
                                    Ending soon</option>
                                <option value="ticket_price_low" {% if selected_sort=="ticket_price_low" %}selected{%
                                    endif %}>Ticket price: low to high</option>
                                <option value="ticket_price_high" {% if selected_sort=="ticket_price_high" %}selected{%
                                    endif %}>Ticket price: high to low</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-2 d-grid">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-funnel me-2"></i>
                                Apply
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>


    <!-- Paginated content section -->

</div>

{% endblock %}
